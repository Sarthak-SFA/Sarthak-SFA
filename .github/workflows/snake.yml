name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: Sarthak-SFA
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#22d3ee&color_dots=#0f172a,#1e293b,#334155,#475569,#64748b
            dist/github-contribution-grid-snake-dark.svg?color_snake=#38bdf8&color_dots=#020617,#0f172a,#1e293b,#334155,#475569

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
